# Default values for the balo-cricket Helm chart.
# Override on a per-environment basis using a values file, e.g.:
#   helm install balo-cricket ./helm/balo-cricket -f helm/balo-cricket/values-dev.yaml

namespace: balo-cricket

# Name of the pre-existing Kubernetes secret used to pull images from GHCR.
# Create it with:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --namespace=balo-cricket \
#     --docker-server=ghcr.io \
#     --docker-username=<github-user> \
#     --docker-password=<ghcr-pat>
imagePullSecret: ghcr-pull-secret

# ---------------------------------------------------------------------------
# Frontend — React UI
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: ghcr.io/samoclay/balo-cricket-react-frontend-ui
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 80
    targetPort: 80
  resources:
    # Sized for local development. Tune before deploying to a shared environment.
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  env:
    # URL the browser-side React code uses to reach the API.
    # Must match the ingress host for the API.
    REACT_APP_API_URL: "http://api.balo-cricket.local"

# ---------------------------------------------------------------------------
# API — Backend
# ---------------------------------------------------------------------------
api:
  image:
    repository: ghcr.io/samoclay/balo-cricket-api
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
    targetPort: 8080
  resources:
    # Sized for local development. Tune before deploying to a shared environment.
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  secrets:
    # Replace these placeholders before installing. Consider using
    # --set api.secrets.jwtSecret=... or a sealed-secrets solution.
    jwtSecret: "REPLACE_WITH_SECURE_JWT_SECRET"
    apiKey: "REPLACE_WITH_SECURE_API_KEY"

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  frontendHost: balo-cricket.local
  apiHost: api.balo-cricket.local
