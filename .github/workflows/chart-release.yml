name: Release Helm Chart

# Runs automatically whenever a commit lands on master.
# The chart-releaser action only publishes a new release when the `version`
# field in helm/balo-cricket/Chart.yaml has been incremented — so simply
# merging a feature branch without bumping the chart version is a no-op.
on:
  push:
    branches:
      - master

jobs:
  release:
    name: Package & Publish Chart
    runs-on: ubuntu-latest

    # chart-releaser needs to create GitHub Releases and push to gh-pages
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout (full history required by chart-releaser)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      # chart-releaser-action will:
      #  1. Package helm/balo-cricket into a .tgz
      #  2. Create a GitHub Release tagged  balo-cricket-<version>
      #     (only when that version doesn't already have a release)
      #  3. Push/update the gh-pages branch with an updated index.yaml
      #     so the repo is a valid Helm repository
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: helm
          # Skip packaging if the release already exists (idempotent)
          skip_existing: true
