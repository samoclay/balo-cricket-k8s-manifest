name: Release Helm Chart

# Runs automatically whenever a commit lands on master.
#
# What this workflow does on each run:
#   1. Packages helm/balo-cricket and creates a versioned GitHub Release
#      (only when Chart.yaml version has been incremented — idempotent).
#   2. Pushes an updated index.yaml to the gh-pages branch so the repo
#      acts as a live Helm repository.
#   3. Enriches the GitHub Release body with:
#        - The bundled frontend and API image versions
#        - Upstream release notes fetched from each image's GitHub repo
#        - A summary of conventional commits since the previous chart tag
#
# To publish a new chart version, bump `version` in helm/balo-cricket/Chart.yaml
# before merging your feature branch, e.g.:
#   helm: bump chart version to 0.2.0
on:
  push:
    branches:
      - master

jobs:
  release:
    name: Package & Publish Chart
    runs-on: ubuntu-latest

    # chart-releaser needs to create GitHub Releases and push to gh-pages
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout (full history required by chart-releaser)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      # chart-releaser-action:
      #   1. Packages helm/balo-cricket into a .tgz
      #   2. Creates a GitHub Release tagged balo-cricket-<version>
      #      (skipped if that release already exists — idempotent)
      #   3. Pushes/updates gh-pages with a new index.yaml
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: helm
          skip_existing: true

      # ---------------------------------------------------------------------------
      # Enrich the GitHub Release body with container image versions and the
      # upstream release notes from each dependent image repository.
      #
      # Implementation lives in scripts/enrich-release.py — keeping it out of the
      # workflow YAML avoids heredoc indentation problems and is easier to read.
      # ---------------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Build enriched release notes
        run: python3 scripts/enrich-release.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Update GitHub Release with enriched notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART_VERSION=$(python3 -c \
            "import yaml; print(yaml.safe_load(open('helm/balo-cricket/Chart.yaml'))['version'])")
          RELEASE_TAG="balo-cricket-${CHART_VERSION}"

          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --notes-file /tmp/release-body.md
            echo "✅ ${RELEASE_TAG} release notes updated"
          else
            echo "ℹ️  Release ${RELEASE_TAG} not found — chart version may be unchanged, skipping."
          fi
