name: Conventional Commits

# Validates that every commit in a pull request follows the
# Conventional Commits specification (https://www.conventionalcommits.org/).
#
# Rules are defined in .commitlintrc.yml at the repo root.
# Recognised types: feat fix docs ci chore refactor perf test style revert
#
# Examples of valid commit messages:
#   feat: add staging environment overlay
#   fix: correct ingress host annotation
#   docs: update getting started section in README
#   ci: add kubeconform schema validation step
#   chore: tidy up deployment YAML comments
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history to reach the base of the PR
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
          # Check every commit in the PR, not just the latest
          failOnWarnings: false
          helpURL: "https://www.conventionalcommits.org/"
          # Ignore commits made before conventional commits was adopted in this repo
          ignoreCommits: |
            a171c2337288cf38d9dab86738322641ff086726
            2df7e1e0ae9628eadd5e2854fe93ace1d12e352f
            bd5600772de35950273479c8142c8ea57b692985
            d54c276bdeea325cb421b34c761a6e7d0f4fff8a
            3648d58fda5908c65b95092571255ee09b8e2939
            bc9b7289ec3b9f59a6ef8b1616d21054220590d2
