---
# Secret for pulling images from GitHub Container Registry (ghcr.io).
# Create this secret by running:
#
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --namespace=balo-cricket \
#     --docker-server=ghcr.io \
#     --docker-username=<your-github-username> \
#     --docker-password=<your-github-pat> \
#     --docker-email=<your-email>
#
# A GitHub Personal Access Token (PAT) with `read:packages` scope is required.
# See: https://docs.github.com/en/packages/working-with-a-github-packages-registry/authenticating-to-the-container-registry

---
# API authentication secrets.
# Replace placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: balo-cricket
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET"
  API_KEY: "REPLACE_WITH_SECURE_API_KEY"
