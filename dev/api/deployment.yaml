apiVersion: apps/v1
kind: Deployment
metadata:
  name: balo-cricket-api
  namespace: balo-cricket
  labels:
    app: balo-cricket-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: balo-cricket-api
  template:
    metadata:
      labels:
        app: balo-cricket-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: balo-cricket-api
          image: ghcr.io/samoclay/balo-cricket-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            # Inject JWT_SECRET and API_KEY from dev/secrets.yaml
            - secretRef:
                name: api-secrets
          resources:
            # Resource values are sized for local development (Docker Desktop).
            # Increase based on measured usage before deploying to a shared environment.
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
